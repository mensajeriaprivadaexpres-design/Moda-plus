<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus y Accesorios</title>
    <style>
        /* Seguridad: Bloqueo de selección y menú contextual */
        body { 
            background-color: #000; color: #d4af37; font-family: sans-serif; margin: 0; 
            user-select: none; -webkit-user-select: none; 
        }
        
        /* Encabezado */
        header { text-align: center; padding: 20px; position: relative; }
        #admin-trigger { cursor: pointer; display: inline-block; }
        .logo { font-size: 2rem; font-weight: bold; color: #d4af37; text-shadow: 0 0 10px #d4af37; }
        
        /* Banner y Botones */
        .banner { border: 2px solid #d4af37; padding: 10px; display: flex; justify-content: center; gap: 15px; margin: 10px; }
        .btn { background: #d4af37; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; }
        
        /* Carruseles */
        .carousel { display: flex; overflow-x: auto; gap: 10px; padding: 10px; scroll-snap-type: x mandatory; }
        .item { min-width: 45%; scroll-snap-align: start; border: 1px solid #d4af37; padding: 10px; text-align: center; }
        
        /* Redes */
        .socials { text-align: center; margin: 20px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div id="admin-trigger" onclick="checkAdmin()">
            <h1 class="logo">CG Moda Plus y Accesorios</h1>
        </div>
        <div class="banner">
            <a href="https://wa.me/tu_numero" class="btn">Asesorías</a>
            <a href="#" class="btn">Reseñas</a>
        </div>
    </header>

    <h2>Colección Moda & Calzada</h2>
    <div class="carousel">
        <div class="item">Producto 1<br><button>Comprar</button></div>
        <div class="item">Producto 2<br><button>Comprar</button></div>
        <div class="item">Producto 3<br><button>Comprar</button></div>
    </div>

    <h2>Accesorios Destacados</h2>
    <div class="carousel">
        <div class="item">Accesorio 1<br><button>Comprar</button></div>
        <div class="item">Accesorio 2<br><button>Comprar</button></div>
    </div>

    <div class="socials">
        <a href="https://www.facebook.com/marlin.giraldo.71" target="_blank">Facebook</a>
    </div>

    <script>
        let clicks = 0;
        function checkAdmin() {
            clicks++;
            if (clicks === 3) {
                let pass = prompt("Ingrese clave de administrador:");
                if (pass === "1234") {
                    alert("Bienvenido al Panel de Administración");
                    // Aquí se habilitaría la lógica del menú interno
                }
                clicks = 0;
            }
        }
    </script>
</body>
</html>
