<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus y Accesorios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; font-family:'Poppins',sans-serif; color:white; }
        
        header { background:linear-gradient(to bottom,#000,#111); padding:20px; text-align:center; border-bottom:1px solid #d4af37; }
        .logo-img { max-width: 250px; cursor: pointer; margin: 0 auto; }
        
        .top-buttons { display:flex; justify-content:center; gap:15px; margin-top:20px; }
        .top-buttons a { padding:10px 20px; border:1px solid #d4af37; border-radius:20px; color:#d4af37; text-decoration:none; font-size:14px; }
        
        .section-title { text-align:center; color:#d4af37; font-family:'Cinzel',serif; margin:40px 0 20px; }
        
        /* Swiper Config */
        .swiper { width: 90%; max-width: 500px; border-radius: 20px; border: 1px solid #333; }
        .swiper-slide img { width: 100%; height: 400px; object-fit: cover; }
        .swiper-pagination-fraction { color: #d4af37; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 10px; width: 60px; margin: 0 auto; }
        
        .card-content { text-align: center; padding: 20px; }
        .buy-btn { display:inline-block; margin-top:10px; padding:12px 30px; background:#d4af37; color:black; border-radius:25px; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body>

<header>
    <img src="https://i.imgur.com/5EyDZn5.png" alt="CG Moda" class="logo-img" id="adminAccess">
    <div class="top-buttons">
        <a href="https://wa.me/573007637773?text=Hola,%20necesito%20asesoría">Asesorías</a>
        <a href="#reviews">Reseñas</a>
    </div>
</header>

<h1 class="section-title">Colección de Ropa</h1>
<div class="swiper productSwiper">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1483985988355-763728e1935b"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1"></div>
    </div>
    <div class="swiper-pagination"></div>
</div>

<div class="card-content">
    <h2>Chaqueta Luxury</h2>
    <p>$180.000</p>
    <a class="buy-btn" href="https://wa.me/573007637773?text=Comprar%20Chaqueta%20Luxury">Comprar</a>
</div>

<h1 class="section-title">Accesorios</h1>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    const swiper = new Swiper('.productSwiper', {
        loop: true,
        pagination: {
            el: '.swiper-pagination',
            type: 'fraction',
        },
    });
</script>

</body>
</html>
