<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus y Accesorios</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <style>
        /* Bloqueo de selección de texto para mayor seguridad */
        body { 
            background:#000; font-family:'Poppins',sans-serif; color:white; padding-bottom: 50px;
            user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; 
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        
        header { background:linear-gradient(to bottom,#000,#111); padding:20px; text-align:center; border-bottom:1px solid #d4af37; }
        .logo-img { max-width: 250px; cursor: pointer; margin: 0 auto; }
        
        .top-buttons { display:flex; justify-content:center; gap:15px; margin-top:20px; }
        .top-buttons a { padding:10px 20px; border:1px solid #d4af37; border-radius:20px; color:#d4af37; text-decoration:none; font-size:14px; }
        
        .swiper { width: 90%; max-width: 500px; border-radius: 20px; border: 1px solid #333; margin-top: 40px; }
        .swiper-slide img { width: 100%; height: 400px; object-fit: cover; }
        .swiper-pagination-fraction { color: #d4af37; font-weight: bold; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 10px; width: 60px; margin: 0 auto; }
        
        .card-content { text-align: center; padding: 20px; margin-bottom: 30px; }
        .buy-btn { display:inline-block; margin-top:10px; padding:12px 30px; background:#d4af37; color:black; border-radius:25px; text-decoration:none; font-weight:bold; }
    </style>
</head>
<body oncontextmenu="return false;"> <header>
    <img src="https://i.imgur.com/5EyDZn5.png" alt="CG Moda" class="logo-img" id="adminAccess">
    <div class="top-buttons">
        <a href="https://wa.me/573007637773?text=Hola,%20necesito%20asesoría">Asesorías</a>
        <a href="#reviews">Reseñas</a>
    </div>
</header>

<div class="swiper productSwiper1">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1483985988355-763728e1935b"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1503341504253-dff4815485f1"></div>
    </div>
    <div class="swiper-pagination pagination1"></div>
</div>
<div class="card-content">
    <h2>Chaqueta Luxury</h2>
    <p>$180.000</p>
    <a class="buy-btn" href="https://wa.me/573007637773?text=Comprar%20Chaqueta%20Luxury">Comprar</a>
</div>

<div class="swiper productSwiper2">
    <div class="swiper-wrapper">
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1515562141207-7a88fb7ce668"></div>
        <div class="swiper-slide"><img src="https://images.unsplash.com/photo-1605763248844-8e100e16361a"></div>
    </div>
    <div class="swiper-pagination pagination2"></div>
</div>
<div class="card-content">
    <h2>Set de Accesorios Gold</h2>
    <p>$85.000</p>
    <a class="buy-btn" href="https://wa.me/573007637773?text=Comprar%20Accesorios">Comprar</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script>
    // Bloqueo de Admin con clave simplificada
    document.getElementById("adminAccess").addEventListener("click", function(){
        let clave = prompt("Ingrese clave administrador");
        if(clave === "cg2026"){
            alert("Acceso concedido (Funcionalidad de panel en desarrollo)");
        } else if(clave !== null) {
            alert("Clave incorrecta");
        }
    });

    new Swiper('.productSwiper1', { loop: true, pagination: { el: '.pagination1', type: 'fraction' } });
    new Swiper('.productSwiper2', { loop: true, pagination: { el: '.pagination2', type: 'fraction' } });
</script>

</body>
</html>
