<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CG Moda Plus y Accesorios</title>
    <style>
        body { 
            background-color: #000; color: #d4af37; font-family: 'Arial', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; user-select: none; 
        }
        
        header { text-align: center; padding: 50px 20px; }
        .logo-box { 
            font-size: 5rem; font-weight: bold; cursor: pointer; 
            color: #d4af37; text-shadow: 0 0 20px #d4af37; 
            margin-bottom: 5px; letter-spacing: -2px;
        }
        .subtitle { font-size: 1.2rem; color: #d4af37; margin-bottom: 30px; }
        
        .main-container { 
            width: 90%; max-width: 400px; border: 1px solid #d4af37; 
            padding: 30px; text-align: center; border-radius: 10px;
        }
        .btn-wa { 
            display: block; background: #d4af37; color: #000; 
            padding: 15px; text-decoration: none; font-weight: bold; 
            border-radius: 5px; font-size: 1.1rem;
        }

        #admin-panel { 
            display: none; background: #111; padding: 20px; 
            border: 1px solid #d4af37; margin-top: 20px; width: 90%; 
            max-width: 400px; text-align: center;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div class="logo-box" onclick="checkAdmin()">C&G</div>
        <div class="subtitle">Moda Plus y Accesorios</div>
    </header>

    <div class="main-container">
        <a href="https://wa.me/573007637773" class="btn-wa">Asesorías</a>
    </div>

    <div id="admin-panel">
        <h2 style="color:#d4af37;">Panel de Administración</h2>
        <p style="color:#fff;">Sistema de gestión activo.</p>
        <button onclick="closeAdmin()" style="background:#d4af37; color:#000; border:none; padding:10px; cursor:pointer; font-weight:bold;">Cerrar Panel</button>
    </div>

    <script>
        let clicks = 0;
        function checkAdmin() {
            clicks++;
            if (clicks === 3) {
                let pass = prompt("Ingrese clave:");
                if (pass === "1234") {
                    document.getElementById('admin-panel').style.display = 'block';
                    clicks = 0;
                } else {
                    alert("Clave incorrecta");
                    clicks = 0;
                }
            }
        }
        function closeAdmin() {
            document.getElementById('admin-panel').style.display = 'none';
        }
    </script>
</body>
</html>
